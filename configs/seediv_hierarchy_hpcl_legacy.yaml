dataset:
  name: SEED-IV
  root: ""
  processed_path: ""
  input_type: lds_de
  normalize: train
  num_classes: 4
  num_subjects: 15
  num_channels: 62
  num_bands: 5
  feature_dim: 310
  time_steps: 10
  stride: 1
  session: 1
  synthetic:
    enabled: false
    samples_per_subject: 120

graph:
  name: seediv_affective_hierarchy
  num_nodes: 6
  num_edges: 5

protocol:
  name: legacy_loso
  val_ratio: 0.0
  test_used_for_selection: true

model:
  name: EAGLE-Net
  d_model: 64
  d_proto: 32
  num_heads: 4
  dropout: 0.1
  proto_temperature: 0.5
  use_hemi: true
  use_direct_head: true
  use_proto: true
  use_edge: true
  use_concept: true
  direct_only: false

fusion:
  alpha_edge: 1.0
  beta_concept: 0.2

train:
  epochs: 100
  batch_size: 64
  lr: 0.0003
  weight_decay: 0.0005
  patience: null
  seed: 2026
  num_workers: 0
  num_threads: 1
  grad_clip: 1.0
  device: auto

loss:
  lambda_direct: 0.3
  lambda_proto: 0.5
  lambda_edge: 0.5
  lambda_concept: 0.1
  lambda_consistency: 0.1
  lambda_radius: 0.01
  radius_margin: 0.05
  lambda_hp_proto_nce: 0.02
  lambda_hp_supcon: 0.0
  lambda_hp_margin: 0.02
  hp_schedule: linear
  hp_warmup_epochs: 10
  hp_ramp_epochs: 30
  hp_proto_mode: hierarchy
  hp_margin_mode: hierarchy
  hp_temperature: 0.2
  hp_include_root_ancestor: false
  hp_leaf_positive_weight: 1.0
  hp_ancestor_positive_weight: 0.3
  hp_hierarchy_margin_base: 0.15
  hp_hierarchy_margin_max: 0.6
  hp_neutral_margin_boost: 0.2
  hp_branch_margin_boost: 0.1
  hp_same_branch_margin_scale: 0.5
  hp_proto_margin_weight: 0.5

logging:
  save_dir: results/seed_iv/hierarchy_hpcl_v3_warmup_legacy
