extends: seed_hyperbolic_path_eagle_full100.yaml

model:
  path_dropout: 0.3
  use_domain_adversarial: true
  grl_lambda: 0.2
  branch_weights:
    path: 1.0
    direct: 0.5
    proto: 0.0
    edge: 1.0
    concept: 0.0

loss:
  lambda_direct: 0.5
  lambda_proto: 0.0
  lambda_edge: 0.0
  lambda_concept: 0.0
  lambda_consistency: 0.0
  lambda_radius: 0.0
  lambda_domain: 0.05
  lambda_hp_proto_nce: 0.02
  lambda_hp_supcon: 0.0
  lambda_hp_margin: 0.0
  lambda_hp_subject_centroid: 0.0
  hp_proto_mode: hierarchy
  hp_temperature: 0.2
  hp_include_root_ancestor: false
  hp_leaf_positive_weight: 1.0
  hp_ancestor_positive_weight: 0.3

logging:
  save_dir: results/seed/hyperbolic_path/v2_full100
